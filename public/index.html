<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>언제 만날까 — 일정 조율</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    /* ── Reset & Tokens ─────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0d0f14;
      --surface:   #151820;
      --surface2:  #1e2230;
      --border:    #2a2f42;
      --accent:    #6c7fff;
      --accent2:   #a78bfa;
      --success:   #34d399;
      --text:      #e8eaf2;
      --muted:     #6b7280;
      --danger:    #f87171;

      --r-sm: 10px;
      --r-md: 16px;
      --r-lg: 24px;

      --shadow: 0 4px 32px rgba(0,0,0,.45);
    }

    body {
      font-family: 'Pretendard', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ─────────────────────────────────────── */
    header {
      padding: 20px 24px;
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 1px solid var(--border);
    }

    .logo {
      width: 32px; height: 32px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
    }

    .logo-text { font-size: 15px; font-weight: 600; letter-spacing: -.3px; }
    .logo-text span { color: var(--accent); }

    /* ── Main Layout ─────────────────────────────────── */
    main {
      flex: 1;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 40px 16px 80px;
    }

    .container { width: 100%; max-width: 680px; }

    /* ── Views ───────────────────────────────────────── */
    .view { display: none; }
    .view.active { display: block; }

    /* ── Cards ───────────────────────────────────────── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r-lg);
      padding: 32px;
      box-shadow: var(--shadow);
    }

    .card + .card { margin-top: 16px; }

    /* ── Typography ──────────────────────────────────── */
    h1 { font-size: clamp(26px, 5vw, 38px); font-weight: 700; letter-spacing: -.8px; line-height: 1.15; }
    h2 { font-size: 20px; font-weight: 600; letter-spacing: -.3px; margin-bottom: 6px; }
    h3 { font-size: 13px; font-weight: 500; color: var(--muted); text-transform: uppercase; letter-spacing: .8px; margin-bottom: 12px; }

    .subtitle { color: var(--muted); font-size: 15px; line-height: 1.6; margin-top: 8px; }

    /* ── Hero ────────────────────────────────────────── */
    .hero { text-align: center; padding: 60px 20px 48px; }
    .hero .badge {
      display: inline-flex; align-items: center; gap: 6px;
      background: rgba(108,127,255,.12); color: var(--accent);
      border: 1px solid rgba(108,127,255,.25);
      border-radius: 999px; padding: 5px 14px; font-size: 13px; font-weight: 500;
      margin-bottom: 24px;
    }
    .hero h1 { margin-bottom: 12px; }
    .hero .subtitle { max-width: 420px; margin: 0 auto 36px; }

    /* ── Inputs ──────────────────────────────────────── */
    label { display: block; font-size: 13px; font-weight: 500; color: var(--muted); margin-bottom: 7px; }

    input[type=text], input[type=date], textarea {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--r-sm);
      padding: 12px 14px;
      color: var(--text);
      font-family: inherit;
      font-size: 15px;
      transition: border-color .18s;
      outline: none;
    }

    input[type=text]:focus, input[type=date]:focus, textarea:focus {
      border-color: var(--accent);
    }

    input[type=date]::-webkit-calendar-picker-indicator { filter: invert(.5); }

    .field { margin-bottom: 20px; }

    /* ── Buttons ─────────────────────────────────────── */
    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
      border: none; border-radius: var(--r-sm);
      font-family: inherit; font-size: 15px; font-weight: 600;
      padding: 13px 24px; cursor: pointer;
      transition: opacity .15s, transform .1s;
    }

    .btn:active { transform: scale(.97); }
    .btn:disabled { opacity: .4; cursor: not-allowed; }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff;
      width: 100%;
    }

    .btn-secondary {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
    }

    .btn-ghost { background: transparent; color: var(--muted); font-weight: 500; padding: 8px 0; }
    .btn-ghost:hover { color: var(--text); }

    /* ── Date Picker Grid ────────────────────────────── */
    .date-range-row {
      display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
      margin-bottom: 16px;
    }

    .date-chip-grid {
      display: flex; flex-wrap: wrap; gap: 8px;
      margin-top: 12px; min-height: 40px;
    }

    .date-chip {
      display: inline-flex; align-items: center; gap: 6px;
      background: rgba(108,127,255,.12); color: var(--accent);
      border: 1px solid rgba(108,127,255,.2);
      border-radius: 999px; padding: 5px 12px; font-size: 13px; font-weight: 500;
    }

    .date-chip button {
      background: none; border: none; color: var(--accent); cursor: pointer;
      font-size: 14px; padding: 0; line-height: 1;
      opacity: .7;
    }

    .date-chip button:hover { opacity: 1; }

    /* ── Calendar ────────────────────────────────────── */
    .cal-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 12px;
    }

    .cal-nav {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 8px; color: var(--text); cursor: pointer;
      font-size: 16px; width: 34px; height: 34px;
      display: flex; align-items: center; justify-content: center;
    }

    .cal-nav:hover { border-color: var(--accent); color: var(--accent); }

    .cal-month { font-size: 15px; font-weight: 600; }

    .cal-grid {
      display: grid; grid-template-columns: repeat(7, 1fr);
      gap: 4px;
    }

    .cal-dow {
      text-align: center; font-size: 11px; font-weight: 600;
      color: var(--muted); padding-bottom: 6px; text-transform: uppercase;
    }

    .cal-day {
      aspect-ratio: 1;
      display: flex; align-items: center; justify-content: center;
      border-radius: 8px; font-size: 13px; font-weight: 500;
      cursor: pointer; border: 1.5px solid transparent;
      transition: all .13s;
      user-select: none;
    }

    .cal-day.empty { cursor: default; }
    .cal-day.past { color: var(--muted); cursor: not-allowed; }

    .cal-day:not(.empty):not(.past):hover {
      background: var(--surface2); border-color: var(--border);
    }

    .cal-day.selected {
      background: rgba(108,127,255,.18);
      border-color: var(--accent);
      color: var(--accent);
    }

    .cal-day.today { border-color: var(--accent2); }

    /* ── Heatmap ─────────────────────────────────────── */
    .result-date-list { display: flex; flex-direction: column; gap: 8px; }

    .result-row {
      display: flex; align-items: center; gap: 12px;
    }

    .result-label {
      font-size: 14px; font-weight: 500; min-width: 90px;
      color: var(--text);
    }

    .result-bar-wrap { flex: 1; height: 32px; background: var(--surface2); border-radius: 6px; overflow: hidden; }

    .result-bar {
      height: 100%; border-radius: 6px;
      display: flex; align-items: center; padding-left: 10px;
      font-size: 12px; font-weight: 600; color: #fff;
      transition: width .4s cubic-bezier(.25,.8,.25,1);
      min-width: 0;
    }

    .result-count {
      font-size: 13px; font-weight: 600; min-width: 28px;
      text-align: right; color: var(--muted);
    }

    .result-crown { font-size: 14px; min-width: 20px; text-align: center; }

    /* Heatmap color grades */
    .grade-0 { background: var(--surface2); }
    .grade-1 { background: rgba(108,127,255,.35); }
    .grade-2 { background: rgba(108,127,255,.55); }
    .grade-3 { background: rgba(108,127,255,.75); }
    .grade-4 { background: linear-gradient(90deg,#6c7fff,#a78bfa); }

    /* ── Participants ────────────────────────────────── */
    .participant-list { display: flex; flex-wrap: wrap; gap: 8px; }

    .participant-chip {
      display: inline-flex; align-items: center; gap: 6px;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 999px; padding: 5px 14px 5px 8px; font-size: 13px;
    }

    .avatar {
      width: 22px; height: 22px; border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex; align-items: center; justify-content: center;
      font-size: 10px; font-weight: 700; color: #fff;
    }

    /* ── Share Banner ────────────────────────────────── */
    .share-box {
      display: flex; gap: 8px; align-items: center;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: var(--r-sm); padding: 10px 14px;
    }

    .share-url {
      flex: 1; font-size: 13px; color: var(--muted);
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }

    .btn-copy {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 7px; color: var(--text); cursor: pointer;
      font-size: 13px; font-weight: 500; padding: 6px 12px;
      font-family: inherit; transition: border-color .15s;
      white-space: nowrap;
    }

    .btn-copy:hover { border-color: var(--accent); color: var(--accent); }

    /* ── Toast ───────────────────────────────────────── */
    #toast {
      position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(20px);
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 999px; padding: 10px 22px; font-size: 14px; font-weight: 500;
      box-shadow: var(--shadow); opacity: 0; transition: all .25s;
      pointer-events: none; z-index: 999; white-space: nowrap;
    }

    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ── Divider ─────────────────────────────────────── */
    .divider { border: none; border-top: 1px solid var(--border); margin: 24px 0; }

    /* ── Loader ──────────────────────────────────────── */
    .loader { display: flex; align-items: center; justify-content: center; padding: 40px; }
    .spinner {
      width: 28px; height: 28px; border-radius: 50%;
      border: 3px solid var(--border); border-top-color: var(--accent);
      animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Empty State ─────────────────────────────────── */
    .empty { text-align: center; padding: 40px 20px; color: var(--muted); }
    .empty-icon { font-size: 36px; margin-bottom: 12px; }

    /* ── Responsive ──────────────────────────────────── */
    @media (max-width: 500px) {
      .card { padding: 20px; }
      .hero { padding: 36px 0 32px; }
      .date-range-row { grid-template-columns: 1fr; }
    }

    /* ── Misc ────────────────────────────────────────── */
    .row { display: flex; gap: 10px; }
    .row .btn { flex: 1; }
    .mt-4 { margin-top: 16px; }
    .mt-6 { margin-top: 24px; }
    .text-success { color: var(--success); }
    .text-muted { color: var(--muted); }
    .text-sm { font-size: 13px; }

    /* inline tag */
    .tag {
      display: inline-flex; align-items: center;
      background: rgba(52,211,153,.12); color: var(--success);
      border: 1px solid rgba(52,211,153,.2);
      border-radius: 999px; padding: 2px 10px; font-size: 12px; font-weight: 600;
    }
  </style>
</head>
<body>

<!-- Header -->
<header>
  <div class="logo">📅</div>
  <span class="logo-text">언제 <span>만날까</span></span>
</header>

<main>
  <div class="container">

    <!-- ── VIEW: Home ─────────────────────────────────── -->
    <div id="view-home" class="view active">
      <div class="hero">
        <div class="badge">✨ 무료 일정 조율 도구</div>
        <h1>모두가 가능한<br/>날짜를 찾아요</h1>
        <p class="subtitle">방을 만들고 링크를 공유하세요. 참여자가 가능한 날짜에 투표하면 최적의 날짜가 자동으로 계산됩니다.</p>
        <button class="btn btn-primary" style="max-width:280px;margin:0 auto;" onclick="showView('view-create')">
          ＋ 새 일정 만들기
        </button>
      </div>

      <div class="card" style="text-align:center;padding:24px;">
        <h3>이미 링크가 있나요?</h3>
        <div style="display:flex;gap:8px;margin-top:0;">
          <input type="text" id="join-input" placeholder="방 코드 또는 링크 붙여넣기" style="flex:1;" />
          <button class="btn btn-secondary" style="width:auto;padding:12px 18px;" onclick="joinRoom()">참여</button>
        </div>
      </div>
    </div>

    <!-- ── VIEW: Create ───────────────────────────────── -->
    <div id="view-create" class="view">
      <button class="btn btn-ghost" onclick="showView('view-home')" style="margin-bottom:16px;">← 돌아가기</button>
      <div class="card">
        <h2>새 일정 만들기</h2>
        <p class="subtitle" style="margin-bottom:24px;">제목과 후보 날짜를 입력하세요</p>

        <div class="field">
          <label>모임 제목 *</label>
          <input type="text" id="room-title" placeholder="예: 팀 회식, 스터디 킥오프…" maxlength="60" />
        </div>

        <div class="field">
          <label>주최자 이름 *</label>
          <input type="text" id="host-name" placeholder="홍길동" maxlength="20" />
        </div>

        <div class="field">
          <label>날짜 선택</label>
          <p class="text-sm text-muted" style="margin-bottom:10px;">날짜를 클릭해 후보 날짜를 추가하세요</p>

          <!-- Calendar -->
          <div style="background:var(--surface2);border:1px solid var(--border);border-radius:var(--r-sm);padding:16px;">
            <div class="cal-header">
              <button class="cal-nav" onclick="calPrev()">‹</button>
              <span class="cal-month" id="cal-month-label"></span>
              <button class="cal-nav" onclick="calNext()">›</button>
            </div>
            <div class="cal-grid" id="cal-grid"></div>
          </div>

          <div class="date-chip-grid" id="selected-dates-display"></div>
        </div>

        <button class="btn btn-primary mt-4" onclick="createRoom()">방 만들기 →</button>
      </div>
    </div>

    <!-- ── VIEW: Room (vote + results) ───────────────── -->
    <div id="view-room" class="view">

      <!-- Room Header -->
      <div class="card" style="padding:24px 28px;">
        <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:12px;flex-wrap:wrap;">
          <div>
            <div class="tag" style="margin-bottom:8px;" id="room-status-tag">진행 중</div>
            <h2 id="room-title-display" style="font-size:22px;"></h2>
            <p class="text-sm text-muted mt-4" id="room-dates-range"></p>
          </div>
        </div>
        <hr class="divider" />
        <h3>링크 공유</h3>
        <div class="share-box">
          <span class="share-url" id="share-url"></span>
          <button class="btn-copy" onclick="copyLink()">복사</button>
        </div>
      </div>

      <!-- Vote Section -->
      <div class="card mt-4" id="vote-section">
        <h2>내 가능 날짜 선택</h2>
        <p class="subtitle" style="margin-bottom:20px;">이름을 입력하고 가능한 날짜를 선택해 투표하세요</p>

        <div class="field">
          <label>이름 *</label>
          <input type="text" id="voter-name" placeholder="홍길동" maxlength="20" />
        </div>

        <div class="field">
          <label>가능한 날짜 선택</label>
          <!-- Vote calendar -->
          <div style="background:var(--surface2);border:1px solid var(--border);border-radius:var(--r-sm);padding:16px;">
            <div class="cal-header">
              <button class="cal-nav" onclick="voteCalPrev()">‹</button>
              <span class="cal-month" id="vote-cal-month-label"></span>
              <button class="cal-nav" onclick="voteCalNext()">›</button>
            </div>
            <div class="cal-grid" id="vote-cal-grid"></div>
          </div>

          <div class="date-chip-grid" id="vote-selected-display"></div>
        </div>

        <button class="btn btn-primary mt-4" onclick="submitVote()">투표 완료 ✓</button>
      </div>

      <!-- Results -->
      <div class="card mt-4" id="results-section">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">
          <h2 style="margin:0;">실시간 결과</h2>
          <span class="text-sm text-muted" id="participant-count">0명 참여</span>
        </div>

        <!-- Best Date Highlight -->
        <div id="best-date-box" style="display:none;background:rgba(52,211,153,.08);border:1px solid rgba(52,211,153,.2);border-radius:12px;padding:16px;margin-bottom:20px;">
          <div style="font-size:12px;font-weight:600;color:var(--success);text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px;">🏆 최다 투표 날짜</div>
          <div id="best-date-text" style="font-size:18px;font-weight:700;"></div>
        </div>

        <div id="results-list" class="result-date-list"></div>

        <hr class="divider" />
        <h3>참여자</h3>
        <div id="participants-display" class="participant-list">
          <div class="empty"><div class="empty-icon">👥</div><p>아직 투표자가 없습니다</p></div>
        </div>
      </div>
    </div>

  </div>
</main>

<div id="toast"></div>

<script>
// ── State ──────────────────────────────────────────────
const API = '/api';
let currentRoom = null;
let pollTimer = null;

// Calendar state: create room
let createCalDate = new Date();
let createSelectedDates = new Set();

// Calendar state: vote
let voteCalDate = new Date();
let voteSelectedDates = new Set();
let roomAvailableDates = [];

// ── Views ──────────────────────────────────────────────
function showView(id) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  if (id === 'view-create') renderCreateCal();
}

// ── Toast ──────────────────────────────────────────────
let toastTimer;
function toast(msg, duration = 2500) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), duration);
}

// ── URL helpers ────────────────────────────────────────
function getRoomIdFromUrl() {
  const params = new URLSearchParams(location.search);
  return params.get('room');
}

function setRoomInUrl(roomId) {
  const url = new URL(location.href);
  url.searchParams.set('room', roomId);
  history.replaceState(null, '', url.toString());
}

// ── Date helpers ───────────────────────────────────────
const DAY_LABELS = ['일','월','화','수','목','금','토'];
const MONTH_LABELS = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];

function toYMD(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function formatDate(ymd) {
  const [y,m,d] = ymd.split('-').map(Number);
  const dt = new Date(y,m-1,d);
  return `${m}/${d}(${DAY_LABELS[dt.getDay()]})`;
}

function formatDateFull(ymd) {
  const [y,m,d] = ymd.split('-').map(Number);
  const dt = new Date(y,m-1,d);
  return `${y}년 ${m}월 ${d}일(${DAY_LABELS[dt.getDay()]})`;
}

// ── Generic Calendar Renderer ──────────────────────────
function renderCalendar({ gridId, monthLabelId, year, month, selectedSet, availableSet, onToggle }) {
  const label = document.getElementById(monthLabelId);
  const grid = document.getElementById(gridId);
  label.textContent = `${year}년 ${MONTH_LABELS[month]}`;
  grid.innerHTML = '';

  // Day of week headers
  DAY_LABELS.forEach(d => {
    const cell = document.createElement('div');
    cell.className = 'cal-dow';
    cell.textContent = d;
    grid.appendChild(cell);
  });

  const firstDay = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const todayYMD = toYMD(new Date());

  // Empty cells
  for (let i = 0; i < firstDay; i++) {
    const cell = document.createElement('div');
    cell.className = 'cal-day empty';
    grid.appendChild(cell);
  }

  for (let d = 1; d <= daysInMonth; d++) {
    const ymd = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const cell = document.createElement('div');
    cell.className = 'cal-day';
    cell.textContent = d;

    const isToday = ymd === todayYMD;
    if (isToday) cell.classList.add('today');

    // If availableSet provided, grey out days not in it
    if (availableSet && !availableSet.has(ymd)) {
      cell.classList.add('past');
    } else {
      if (selectedSet.has(ymd)) cell.classList.add('selected');
      cell.addEventListener('click', () => onToggle(ymd, cell));
    }

    grid.appendChild(cell);
  }
}

// ── Create Room Calendar ───────────────────────────────
function renderCreateCal() {
  renderCalendar({
    gridId: 'cal-grid',
    monthLabelId: 'cal-month-label',
    year: createCalDate.getFullYear(),
    month: createCalDate.getMonth(),
    selectedSet: createSelectedDates,
    availableSet: null,
    onToggle: (ymd, cell) => {
      if (createSelectedDates.has(ymd)) {
        createSelectedDates.delete(ymd);
        cell.classList.remove('selected');
      } else {
        createSelectedDates.add(ymd);
        cell.classList.add('selected');
      }
      renderCreateChips();
    }
  });
}

function calPrev() { createCalDate.setMonth(createCalDate.getMonth() - 1); renderCreateCal(); }
function calNext() { createCalDate.setMonth(createCalDate.getMonth() + 1); renderCreateCal(); }

function renderCreateChips() {
  const container = document.getElementById('selected-dates-display');
  container.innerHTML = '';
  const sorted = [...createSelectedDates].sort();
  sorted.forEach(ymd => {
    const chip = document.createElement('span');
    chip.className = 'date-chip';
    chip.innerHTML = `${formatDate(ymd)} <button onclick="removeCreateDate('${ymd}')">×</button>`;
    container.appendChild(chip);
  });
}

function removeCreateDate(ymd) {
  createSelectedDates.delete(ymd);
  renderCreateChips();
  renderCreateCal();
}

// ── Vote Calendar ──────────────────────────────────────
function renderVoteCal() {
  const avail = new Set(roomAvailableDates);
  renderCalendar({
    gridId: 'vote-cal-grid',
    monthLabelId: 'vote-cal-month-label',
    year: voteCalDate.getFullYear(),
    month: voteCalDate.getMonth(),
    selectedSet: voteSelectedDates,
    availableSet: avail,
    onToggle: (ymd, cell) => {
      if (voteSelectedDates.has(ymd)) {
        voteSelectedDates.delete(ymd);
        cell.classList.remove('selected');
      } else {
        voteSelectedDates.add(ymd);
        cell.classList.add('selected');
      }
      renderVoteChips();
    }
  });
}

function voteCalPrev() { voteCalDate.setMonth(voteCalDate.getMonth() - 1); renderVoteCal(); }
function voteCalNext() { voteCalDate.setMonth(voteCalDate.getMonth() + 1); renderVoteCal(); }

function renderVoteChips() {
  const container = document.getElementById('vote-selected-display');
  container.innerHTML = '';
  const sorted = [...voteSelectedDates].sort();
  sorted.forEach(ymd => {
    const chip = document.createElement('span');
    chip.className = 'date-chip';
    chip.innerHTML = `${formatDate(ymd)} <button onclick="removeVoteDate('${ymd}')">×</button>`;
    container.appendChild(chip);
  });
}

function removeVoteDate(ymd) {
  voteSelectedDates.delete(ymd);
  renderVoteChips();
  renderVoteCal();
}

// ── Create Room ────────────────────────────────────────
async function createRoom() {
  const title = document.getElementById('room-title').value.trim();
  const hostName = document.getElementById('host-name').value.trim();

  if (!title) { toast('⚠️ 모임 제목을 입력하세요'); return; }
  if (!hostName) { toast('⚠️ 주최자 이름을 입력하세요'); return; }
  if (createSelectedDates.size === 0) { toast('⚠️ 날짜를 하나 이상 선택하세요'); return; }

  const dates = [...createSelectedDates].sort();

  try {
    const res = await fetch(`${API}/rooms`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ title, host_name: hostName, dates })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.detail || 'Error');

    setRoomInUrl(data.room_id);
    await loadRoom(data.room_id);
  } catch (e) {
    toast('❌ 방 만들기 실패: ' + e.message);
  }
}

// ── Join Room ──────────────────────────────────────────
function joinRoom() {
  let val = document.getElementById('join-input').value.trim();
  // Extract room ID from URL or treat as ID
  try { val = new URL(val).searchParams.get('room') || val; } catch {}
  if (!val) { toast('⚠️ 코드 또는 링크를 입력하세요'); return; }

  setRoomInUrl(val);
  loadRoom(val);
}

// ── Load Room ──────────────────────────────────────────
async function loadRoom(roomId) {
  showView('view-room');
  try {
    const res = await fetch(`${API}/rooms/${roomId}/results`);
    if (res.status === 404) { toast('❌ 존재하지 않는 방입니다'); showView('view-home'); return; }
    const data = await res.json();
    currentRoom = { id: roomId, ...data };
    renderRoom(data, roomId);

    // Start polling
    clearInterval(pollTimer);
    pollTimer = setInterval(() => pollResults(roomId), 4000);
  } catch (e) {
    toast('❌ 방 불러오기 실패');
    showView('view-home');
  }
}

async function pollResults(roomId) {
  try {
    const res = await fetch(`${API}/rooms/${roomId}/results`);
    if (!res.ok) return;
    const data = await res.json();
    renderResults(data);
  } catch {}
}

// ── Render Room ────────────────────────────────────────
function renderRoom(data, roomId) {
  document.getElementById('room-title-display').textContent = data.title;

  if (data.dates && data.dates.length) {
    const sorted = [...data.dates].sort();
    const first = formatDateFull(sorted[0]);
    const last = formatDateFull(sorted[sorted.length - 1]);
    document.getElementById('room-dates-range').textContent =
      sorted.length === 1 ? first : `${first} ~ ${last} · ${sorted.length}개 날짜`;
  }

  // Share URL
  const shareUrl = `${location.origin}${location.pathname}?room=${roomId}`;
  document.getElementById('share-url').textContent = shareUrl;

  // Setup vote calendar
  roomAvailableDates = data.dates || [];
  voteSelectedDates.clear();
  if (roomAvailableDates.length > 0) {
    const [y, m] = roomAvailableDates[0].split('-').map(Number);
    voteCalDate = new Date(y, m - 1, 1);
  }
  renderVoteCal();
  renderVoteChips();

  renderResults(data);
}

// ── Render Results ─────────────────────────────────────
function renderResults(data) {
  const participants = data.participants || {};
  const tally = data.tally || {};
  const best = data.best_dates || [];
  const dates = data.dates || [];
  const totalVoters = Object.keys(participants).length;

  // Participant count
  document.getElementById('participant-count').textContent = `${totalVoters}명 참여`;

  // Best date box
  const bestBox = document.getElementById('best-date-box');
  const bestText = document.getElementById('best-date-text');
  if (best.length > 0 && totalVoters > 0) {
    bestBox.style.display = 'block';
    const maxVotes = tally[best[0]];
    bestText.textContent = best.map(formatDateFull).join(', ') +
      ` — ${maxVotes}명 가능`;
  } else {
    bestBox.style.display = 'none';
  }

  // Results list
  const list = document.getElementById('results-list');
  list.innerHTML = '';

  if (dates.length === 0) {
    list.innerHTML = '<div class="empty"><div class="empty-icon">📊</div><p>날짜 정보 없음</p></div>';
    return;
  }

  const maxVotes = Math.max(...Object.values(tally), 1);
  const sortedDates = [...dates].sort((a, b) => (tally[b] || 0) - (tally[a] || 0));

  sortedDates.forEach(ymd => {
    const votes = tally[ymd] || 0;
    const pct = totalVoters > 0 ? (votes / totalVoters) * 100 : 0;
    const grade = maxVotes === 0 ? 0 : Math.ceil((votes / maxVotes) * 4);
    const isBest = best.includes(ymd) && totalVoters > 0;

    const row = document.createElement('div');
    row.className = 'result-row';
    row.innerHTML = `
      <div class="result-crown">${isBest && votes > 0 ? '👑' : ''}</div>
      <div class="result-label">${formatDate(ymd)}</div>
      <div class="result-bar-wrap">
        <div class="result-bar grade-${grade}" style="width:${pct}%;">${votes > 0 && pct > 18 ? votes+'명' : ''}</div>
      </div>
      <div class="result-count">${votes}</div>
    `;
    list.appendChild(row);
  });

  // Participants
  const pDisp = document.getElementById('participants-display');
  pDisp.innerHTML = '';
  const names = Object.keys(participants);
  if (names.length === 0) {
    pDisp.innerHTML = '<div class="empty"><div class="empty-icon">👥</div><p>아직 투표자가 없습니다</p></div>';
    return;
  }
  names.forEach(name => {
    const chip = document.createElement('div');
    chip.className = 'participant-chip';
    chip.innerHTML = `<div class="avatar">${name.charAt(0)}</div>${name}`;
    pDisp.appendChild(chip);
  });
}

// ── Submit Vote ────────────────────────────────────────
async function submitVote() {
  const name = document.getElementById('voter-name').value.trim();
  if (!name) { toast('⚠️ 이름을 입력하세요'); return; }
  if (voteSelectedDates.size === 0) { toast('⚠️ 날짜를 하나 이상 선택하세요'); return; }
  if (!currentRoom) return;

  try {
    const res = await fetch(`${API}/rooms/${currentRoom.id}/vote`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        participant_name: name,
        selected_dates: [...voteSelectedDates].sort()
      })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.detail || 'Error');

    toast('✅ 투표 완료!');
    // Merge tally into render
    renderResults({ ...currentRoom, ...data });
  } catch (e) {
    toast('❌ 투표 실패: ' + e.message);
  }
}

// ── Copy Link ──────────────────────────────────────────
function copyLink() {
  const url = document.getElementById('share-url').textContent;
  navigator.clipboard.writeText(url).then(() => toast('🔗 링크 복사됨!')).catch(() => {
    // Fallback
    const ta = document.createElement('textarea');
    ta.value = url; document.body.appendChild(ta);
    ta.select(); document.execCommand('copy'); ta.remove();
    toast('🔗 링크 복사됨!');
  });
}

// ── Init ───────────────────────────────────────────────
(function init() {
  const roomId = getRoomIdFromUrl();
  if (roomId) {
    loadRoom(roomId);
  } else {
    renderCreateCal();
  }
})();
</script>
